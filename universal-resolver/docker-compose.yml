# Universal Resolver driver for did:nfd
# Add this to your Universal Resolver docker-compose.yml
#
# See: https://github.com/decentralized-identity/universal-resolver

services:
  driver-did-nfd:
    image: ghcr.io/txnlab/did-nfd-resolver:latest
    build:
      context: ..
      dockerfile: ../Dockerfile
    ports:
      - "8167:8080"
    environment:
      LISTEN: ":8080"
      ALGOD_URL: "https://mainnet-api.4160.nodely.dev"
      ALGOD_TOKEN: ""
      REGISTRY_ID: "760937186"
      CACHE_TTL: "5m"
    restart: unless-stopped
